<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dba541"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="#1a1612"/>
  <g transform="translate(256,256)">
    <!-- Ginkgo leaf shape -->
    <path d="M0,-160 C60,-140 120,-80 130,0 C140,80 80,140 0,170 C-80,140 -140,80 -130,0 C-120,-80 -60,-140 0,-160Z"
          fill="url(#g)" opacity="0.9"/>
    <!-- Leaf stem -->
    <line x1="0" y1="165" x2="0" y2="210" stroke="#8b6914" stroke-width="6" stroke-linecap="round"/>
    <!-- Leaf vein -->
    <path d="M0,-140 L0,140" stroke="#1a1612" stroke-width="3" opacity="0.3"/>
    <path d="M0,-80 L60,-40 M0,-30 L80,10 M0,-30 L-80,10 M0,30 L65,70 M0,30 L-65,70 M0,90 L45,110 M0,90 L-45,110"
          stroke="#1a1612" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold"
        fill="#dba541" letter-spacing="4">GINKGO</text>
</svg>
